name: Opire Bounty Watch

on:
  schedule:
    - cron: "0 */3 * * *"  # 3時間ごと (0,3,6,9,12,15,18,21 UTC)
  workflow_dispatch:
    inputs:
      memo:
        description: "Run memo"
        required: true

permissions:
  contents: write
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm install

      - name: Fetch bounties
        run: npm run fetch

      - name: Update README stats
        run: npm run update-readme

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/bounties.json README.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: update bounty snapshot ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "no changes"
          fi

      - name: Post new bounties to tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count=$(jq 'length' data/new-bounties.json)
          if [ "$count" -eq 0 ]; then
            echo "no new bounties"
            exit 0
          fi
          body=$(jq -r '
            def badge:
              .progress_signals.verdict as $v |
              if $v == "likely_taken" then " ⚠️ 実質着手済（PR有）"
              elif $v == "contested" then " ⚠️ 競合あり"
              else "" end;
            def detail:
              .progress_signals as $s |
              if $s == null then "" else
                "\n    " +
                (if ($s.linked_prs | length) > 0 then "PR: " + ($s.linked_prs | join(", ")) + " / " else "" end) +
                (if ($s.working_commenters | length) > 0 then "working: " + ($s.working_commenters | join(",")) + " / " else "" end) +
                (if ($s.try_commenters | length) > 0 then "/try: " + (($s.try_commenters | length)|tostring) else "" end)
              end;
            "## New Opire bounties (" + (now | strftime("%Y-%m-%d")) + ")\n\n" +
            ([.[] | "- **$" + (.amount_usd|tostring) + "** [" + (.org_name // "?") + "] " +
              (if .title then .title else "(no title)" end) +
              (if .url then " — " + .url else "" end) +
              (if (.programming_languages | length) > 0 then " `" + (.programming_languages | join(",")) + "`" else "" end) +
              badge + detail
             ] | join("\n"))
          ' data/new-bounties.json)
          gh issue comment 1 --repo "$GITHUB_REPOSITORY" --body "$body"
